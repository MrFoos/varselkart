<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>varselkart.no – Nasjonalt varslingskart</title>
  <meta name="description" content="Offisielle varsler fra MET, NVE, Statens vegvesen og Avinor samlet på ett kart.">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header id="header">
    <div>
      <h1>varselkart.no</h1>
      <div class="subtitle">Offisielle varsler fra MET · NVE · Statens vegvesen · Avinor</div>
    </div>
  </header>

  <div id="main">
    <div id="map"></div>

    <!-- Lag-kontroll -->
    <div id="layer-panel">
      <h3>Lag</h3>
      <label class="lag-toggle"><input type="checkbox" data-lag="met" checked> <span>MET Farevarsel</span></label>
      <label class="lag-toggle"><input type="checkbox" data-lag="nve_flom" checked> <span>NVE Flom</span></label>
      <label class="lag-toggle"><input type="checkbox" data-lag="nve_jordskred" checked> <span>NVE Jordskred</span></label>
      <label class="lag-toggle"><input type="checkbox" data-lag="nve_snoskred" checked> <span>NVE Snøskred</span></label>
      <label class="lag-toggle"><input type="checkbox" data-lag="vegvesen"> <span>Vegvesen</span></label>
      <label class="lag-toggle"><input type="checkbox" data-lag="avinor"> <span>Avinor</span></label>
    </div>

    <!-- Sidebar / bottom sheet -->
    <aside id="sidebar">
      <div id="sidebar-handle"></div>
      <div id="sidebar-header">
        <h2>Aktive varsler</h2>
        <div id="varsel-count">Laster…</div>
      </div>
      <div id="varsel-list">
        <div id="tom-melding">Ingen aktive varsler akkurat nå.</div>
      </div>
    </aside>
  </div>

  <footer id="status-bar">
    <span id="feed-status-items">Kobler til…</span>
    <span style="margin-left:auto; color: #555">
      Data under <a href="https://data.norge.no/nlod/no/2.0" target="_blank" style="color:#555">NLOD 2.0</a>
      · Kart © <a href="https://kartverket.no" target="_blank" style="color:#555">Kartverket</a>
    </span>
  </footer>
</div>

<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
<script type="module" src="src/app.js"></script>
</body>
</html>
