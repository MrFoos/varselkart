server {
    listen 80;
    server_name varselkart.no www.varselkart.no localhost;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://unpkg.com https://umami.varselkart.no; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://fonts.openmaptiles.org; img-src 'self' data: blob: https://cache.kartverket.no; connect-src 'self' https://cache.kartverket.no https://fonts.openmaptiles.org https://umami.varselkart.no https://unpkg.com; worker-src blob:; frame-ancestors 'self'; base-uri 'self'" always;

    # SEO
    location = /robots.txt {
        proxy_pass http://backend:8000/robots.txt;
    }
    location = /sitemap.xml {
        proxy_pass http://backend:8000/sitemap.xml;
    }

    # Statiske assets — kort cache for js/css (ikke fingerprintet), lengre for bilder/fonter.
    # NB: add_header i en location overstyrer arvede headers; det er greit her siden
    # security-headerne primært gjelder HTML-dokumentene som serveres via location /.
    location ~* \.(js|css)$ {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=300";
    }
    location ~* \.(png|svg|ico|webp|woff2?|webmanifest)$ {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=604800";
    }

    # Frontend (statiske filer)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_intercept_errors on;
        error_page 404 /404.html;
    }
    location = /404.html {
        proxy_pass http://frontend:80/404.html;
        internal;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_valid 200 30s;
        add_header Cache-Control "public, max-age=30";
    }

    # Helse-endepunkt
    location /health {
        proxy_pass http://backend:8000/api/status;
    }
}
